  - {type: variant, offset: 0, length: 396, content: 欽定四庫全書史部二資治通鑑目録編年類提要臣等謹按資治通鑑目録三十卷宋司馬光撰此書亦與通鑑同奏上即進書表所謂畧舉事目以備檢閲者也其法年經國緯著其嵗陽嵗名於上而各標通鑑卷數於下又以劉義叟長厯氣朔閏月及史所載七政之變著於上方復撮書中精要之語㪚於間次第釐然具有條理葢通鑑一書包括宏富而篇帙浩繁光恐讀者倦於披尋故於編纂之時提綱挈要併成斯編使相輔而行端緒易於循覧其體全仿年表用史漢書之舊例其標明卷數使知某事在某年某年在某卷兼用目録之體則光之創例通鑑為紀志𫝊之總㑹此書又通鑑之總㑹矣至五星凌犯之類見於各史天文志者通鑑例不偹書皆列上方亦足補本書所未及書録觧題稱光患本書浩大難領畧而目録無首尾晩著通鑑舉要厯八十卷其稿在晁説之以道家紹興初謝克家任伯得而上之今其本不𫝊讀書志又别載通鑑節文六十卷亦稱光所自鈔今亦不𫝊惟此書以附通鑑得存尚足為全書之綱領云乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀, SBCK: ''}
